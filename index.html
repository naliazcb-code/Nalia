<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,sans-serif;}
body{background:#0a0f1e;color:#e2e8f0;max-width:430px;margin:0 auto;padding-bottom:75px;}
/* Header */
.hdr{background:#0d1b3e;padding:14px 16px;border-bottom:1px solid #1e3a6e;position:sticky;top:0;z-index:50;}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:2px;color:#fff;}
.hdr-sub{font-size:11px;color:#64b5f6;margin-top:1px;}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0d1b3e;border-top:1px solid #1e3a6e;display:flex;z-index:50;}
.nb{flex:1;padding:8px 2px 6px;background:none;border:none;color:#546e7a;font-size:9px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nb.on{color:#42a5f5;}
.nb-ico{font-size:22px;}
/* Pages */
.pg{display:none;padding:12px;}
.pg.on{display:block;}
/* Cards */
.c{background:#0d1b3e;border:1px solid #1e3a6e;border-radius:12px;padding:14px;margin-bottom:10px;}
.c-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64b5f6;margin-bottom:10px;}
/* Stat grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.st{background:#070d1a;border-radius:8px;padding:10px;}
.st-l{font-size:9px;color:#546e7a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.st-v{font-size:16px;font-weight:700;}
/* Colors */
.green{color:#66bb6a;} .blue{color:#42a5f5;} .purple{color:#ab47bc;}
.orange{color:#ffa726;} .red{color:#ef5350;} .cyan{color:#26c6da;} .gray{color:#546e7a;}
/* Buttons */
.btn{display:block;width:100%;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;}
.btn-blue{background:linear-gradient(135deg,#1565c0,#0d47a1);}
.btn-green{background:linear-gradient(135deg,#1b5e20,#2e7d32);}
.btn-red{background:#b71c1c;}
.btn-gray{background:#37474f;}
.btn-sm{border:none;border-radius:6px;color:#fff;padding:5px 9px;font-size:11px;cursor:pointer;margin-left:4px;}
/* Row */
.row{display:flex;gap:8px;margin-bottom:8px;}
.row .btn{margin-top:0;}
/* Toggle buttons */
.tg{flex:1;padding:10px;border-radius:8px;border:2px solid #1e3a6e;font-size:13px;font-weight:600;color:#546e7a;background:#0a1428;cursor:pointer;}
.tg.on{border-color:#1565c0;color:#fff;background:#1565c0;}
.tg.on-g{border-color:#1b5e20;color:#fff;background:#1b5e20;}
.tg.on-o{border-color:#e65100;color:#fff;background:#e65100;}
/* Day/Hour pills */
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.pill{padding:7px 11px;border-radius:20px;border:1px solid #1e3a6e;font-size:12px;font-weight:600;color:#546e7a;background:#0a1428;cursor:pointer;}
.pill.on{border-color:#1565c0;color:#fff;background:#1565c0;}
/* Numpad */
.numpad-display{font-size:36px;font-weight:800;text-align:center;padding:14px;background:#070d1a;border-radius:10px;margin-bottom:8px;color:#fff;letter-spacing:1px;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.nk{padding:16px;border:none;border-radius:8px;font-size:20px;font-weight:700;cursor:pointer;background:#1a2744;color:#fff;}
.nk.del{background:#b71c1c;}
.nk.zero{grid-column:span 2;}
/* List rows */
.lr{padding:9px 0;border-bottom:1px solid #0d1428;display:flex;justify-content:space-between;align-items:center;}
.lr:last-child{border-bottom:none;}
.lr-l{font-size:12px;color:#e2e8f0;}
.lr-s{font-size:10px;color:#546e7a;margin-top:1px;}
/* Progress bar */
.bar{background:#1a2744;border-radius:4px;height:6px;margin-top:6px;}
.bar-fill{height:6px;border-radius:4px;}
/* Badge */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:flex-end;justify-content:center;}
.modal.on{display:flex;}
.modal-box{background:#0d1b3e;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;border-top:1px solid #1565c0;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-row{display:flex;gap:8px;margin-top:12px;}
.inp{width:100%;background:#070d1a;border:1px solid #1e3a6e;border-radius:8px;padding:11px 12px;font-size:15px;color:#e2e8f0;margin-bottom:8px;-webkit-appearance:none;outline:none;}
select.inp{-webkit-appearance:none;}
label{font-size:11px;color:#64b5f6;display:block;margin-bottom:4px;}
/* Error */
.err{background:#b71c1c;color:#fff;border-radius:8px;padding:8px 10px;font-size:12px;margin-top:6px;display:none;}
.err.on{display:block;}
</style>
</head>

<script>

function arrFilter(arr,fn){var r=[];for(var i=0;i<arr.length;i++){if(fn(arr[i]))r.push(arr[i]);}return r;}

var CARDS_DEFAULT = [

  {id:2,name:"Capital One",bal:691.05,lim:600,min:27,due:"Jul 6",over:0},

// Always use these balances on load - override localStorage
var CARDS_CURRENT = {

  2:{bal:691.05,lim:600,min:27,due:"Jul 6",over:0},

function emptyState() {
  return {
    checking: 0, savings: 0,
    amazon: [], instacart: [], future: [],
    carry_net: 0, carry_tips: 0,
    cards: JSON.parse(JSON.stringify(CARDS_DEFAULT)),
    txns: [], card_txns: [],
    gastos: JSON.parse(JSON.stringify(GASTOS_DEFAULT)),
    deudas: [],
    week_start: new Date().toISOString(),
    history: []
  };
}

var S;
try {
  var raw = localStorage.getItem(SK);
  S = raw ? JSON.parse(raw) : emptyState();
  // Always force bank balances to 0 on fresh key
  if(!raw) { S.checking=0; S.savings=0; }
  if (!S.gastos || !S.gastos.length) S.gastos = JSON.parse(JSON.stringify(GASTOS_DEFAULT));
  if (!S.deudas) S.deudas = [];
  if (!S.txns) S.txns = [];
  if (!S.card_txns) S.card_txns = [];
  // Always fix card names
  var cn = {1:"Bank of America",2:"Capital One",3:"Chase"};
  S.cards.forEach(function(c){c.name=cn[c.id]||c.name;});
} catch(e) { S = emptyState(); }

function save() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e){} }
function fmt(n) { return "$" + (+(n||0)).toFixed(2); }
function pf(v) { return Math.max(0, parseFloat(String(v||0))||0); }
function today() { return new Date().toLocaleDateString("es-US",{weekday:"short",month:"short",day:"numeric"}); }
function todayDay() { return new Date().getDate(); }
function isSun() { return new Date().getDay() === 0; }

// ===================== NAV =====================
var curPg = "resumen";
function nav(pg) {
  document.querySelectorAll(".nb").forEach(function(b,i){b.className="nb"+(["resumen","trabajar","finanzas","gastos","historial"][i]===pg?" on":"");});
  document.querySelectorAll(".pg").forEach(function(p){p.className="pg";});
  document.getElementById("pg-"+pg).className="pg on";
  curPg = pg;
  render(pg);
}
function render(pg) {
  if(pg==="resumen") renderResumen();
  else if(pg==="trabajar") renderTrabajar();
  else if(pg==="finanzas") renderFinanzas();
  else if(pg==="gastos") renderGastos();
  else if(pg==="historial") renderHistorial();
}
function rerender() { render(curPg); }

// ===================== NUMPAD =====================
var npStr = ""; var npTarget = null; var npCallback = null;
var np2Str = ""; var np2Callback = null;

function openAmt(title, current, cb) {
  npStr = current > 0 ? String(current) : "";
  npCallback = cb;
  document.getElementById("m-amt-title").textContent = title;
  document.getElementById("np-display").textContent = "$" + (npStr || "0.00");
  openM("m-amt");
}
function nk(k) {
  if(k==="del") npStr = npStr.slice(0,-1);
  else if(k===".") { if(npStr.indexOf(".")<0) npStr += "."; }
  else { var d=npStr.indexOf("."); if(d>=0&&npStr.length-d>2) return; npStr += k; }
  document.getElementById("np-display").textContent = "$" + (npStr||"0.00");
}
function confirmAmt() {
  var v = pf(npStr);
  closeM("m-amt");
  if(npCallback) npCallback(v);

// ===================== CALC =====================
function calc() {
  var ab=0, at=0, aig=0, ait=0;
  S.amazon.forEach(function(b){
    if(b.hours===1 && b.tipsPd){
      // 1h block with pending tips: hold, don't count until confirmed
    } else if(b.instant){
      aig+=b.gross; ait+=(b.tips||0);
    } else {
      ab+=b.gross; at+=(b.tipsPd?0:(b.tips||0));
    }
  });
  var ig=0; S.instacart.forEach(function(b){ig+=b.gross;});
  var an=ab*.8, as2=ab*.2, iN=ig*.8, is2=ig*.2;
  var co=S.carry_net||0, ct=S.carry_tips||0;
  var hw=0; S.amazon.forEach(function(b){hw+=(b.hours||0);});
  var hf=0; S.future.forEach(function(b){hf+=(b.hours||0);});
  var td=0; S.cards.forEach(function(c){td+=c.bal;});
  var dd=0; S.deudas.forEach(function(d){dd+=d.bal;});
  return {
    an:an, as2:as2, at:at, aig:aig, ait:ait,
    iN:iN, is2:is2,
    tn:an+iN, ts:as2+is2,
    co:co, ct:ct,
    toChk:(an+iN)+co,
    toCap:(as2+is2)+at+ct,
    hw:hw, hf:hf, hu:hw+hf,
    hl:Math.max(0,40-(hw+hf)),
    td:td, dd:dd
  };
}

  var dayBlocks=S.amazon.filter(function(b){return b.day===selDay;});
  var instDayBlocks=S.instacart.filter(function(b){return b.day===selDay;});
  var dayGross=0,dayNet=0,dayTips=0,daySav=0;
  dayBlocks.forEach(function(b){dayGross+=b.gross;dayNet+=b.gross*.8;dayTips+=(b.tipsPd?0:(b.tips||0));daySav+=b.gross*.2;});
  instDayBlocks.forEach(function(b){dayGross+=b.gross;dayNet+=b.gross*.8;daySav+=b.gross*.2;});
  var el=document.getElementById("day-summary");

  if(dayBlocks.length===0&&instDayBlocks.length===0){el.style.display="none";return;}
  el.style.display="block";
  el.innerHTML='<div class="c-title" style="color:#ffa726;">📅 '+DAYS[selDay]+' — Lo que llevas</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+

function addBloque(){

    wGross=0;wTips=0;wHours=null;save();renderTrabajar();return;
  }

function doneFuturo(id){
  var idx=-1; S.future.forEach(function(b,i){if(b.id===id)idx=i;});
  if(idx<0)return;
  var b=S.future[idx]; S.future.splice(idx,1);
  if(b.gross>0) S.amazon.push({id:Date.now(),type:"amazon",gross:b.gross,tips:b.tips,tipsPd:b.tipsPd,instant:false,hours:b.hours,day:b.day,date:DAYS[b.day],ts:new Date().toISOString()});
  save();renderTrabajar();
}
function delFuturo(id){S.future=S.future.filter(function(b){return b.id!==id;});save();renderTrabajar();}
function delBloque(type,id){
  if(type==="amazon")S.amazon=S.amazon.filter(function(b){return b.id!==id;});
  else S.instacart=S.instacart.filter(function(b){return b.id!==id;});
  save();renderTrabajar();
}

function resetBal(){S.checking=0;S.savings=0;S.txns=[];save();renderFinanzas();renderResumen();}
function cargoTarjetaModal(id){
  var card=arrFind(S.cards,function(c){return c.id===id;});
  var name=card?card.name:"tarjeta";
  openPago("🛒 Cargo: "+name,"",function(v){
    if(card) card.bal+=v;
    S.card_txns.unshift({id:Date.now(),cardId:id,type:"cargo",amt:v,note:card?card.name:"",date:today()});
    save();renderFinanzas();renderResumen();
  });
}
function pagarTarjetaModal(id){
  var card=arrFind(S.cards,function(c){return c.id===id;});
  var name=card?card.name:"tarjeta";
  openPago("Pagar: "+name,"",function(v,b){pagarTarjeta(id,v,b);});
}
function pagarTarjeta(id,amt,banco){
  var b=banco||"sav";
  if(b==="chk")S.checking-=amt;else S.savings-=amt;
  var card=arrFind(S.cards,function(c){return c.id===id;});
  if(card)card.bal=Math.max(0,card.bal-amt);
  var linkId=Date.now();
  S.card_txns.unshift({id:linkId,cardId:id,type:"pay",amt:amt,note:card?card.name:"",date:today(),linkId:linkId});
  S.txns.unshift({id:linkId+1,acct:b,type:"wit",amt:amt,note:"Pago: "+(card?card.name:"tarjeta"),date:today(),linkId:linkId});
  save();renderFinanzas();renderResumen();
}
function delTxn(id){
  var t=arrFind(S.txns,function(x){return x.id===id;});
  if(t){
    var d=t.type==="dep"?-t.amt:t.amt;
    if(t.acct==="chk")S.checking+=d;else S.savings+=d;
    if(t.linkId){
      var ct=arrFind(S.card_txns,function(x){return x.linkId===t.linkId;});
      if(ct){var card=arrFind(S.cards,function(c){return c.id===ct.cardId;});if(card)card.bal+=ct.amt;S.card_txns=arrFilter(S.card_txns,function(x){return x.linkId!==t.linkId;});}
    }
  }
  S.txns=arrFilter(S.txns,function(x){return x.id!==id;});
  save();renderFinanzas();renderResumen();
}
function delCtxn(id){
  var t=arrFind(S.card_txns,function(x){return x.id===id;});
  if(t){
    var card=arrFind(S.cards,function(c){return c.id===t.cardId;});
    if(card){
      if(t.type==="pay"){
        // Reverse payment: restore card balance and bank balance
        card.bal+=t.amt;
        if(t.linkId){
          var bt=arrFind(S.txns,function(x){return x.linkId===t.linkId;});
          if(bt){if(bt.acct==="chk")S.checking+=t.amt;else S.savings+=t.amt;}
          S.txns=arrFilter(S.txns,function(x){return x.linkId!==t.linkId;});
        }
      } else if(t.type==="cargo"){
        // Reverse cargo: reduce card balance
        card.bal=Math.max(0,card.bal-t.amt);
      }
    }
  }
  S.card_txns=arrFilter(S.card_txns,function(x){return x.id!==id;});
  save();renderFinanzas();renderResumen();
}
function openTarjeta(id){
  var card=arrFind(S.cards,function(c){return c.id===id;});
  if(!card)return;
  document.getElementById("tc-id").value=id;
  document.getElementById("tc-bal").value=card.bal;
  document.getElementById("tc-lim").value=card.lim;
  document.getElementById("tc-min").value=card.min;
  document.getElementById("tc-due").value=card.due;
  document.getElementById("m-tarjeta-title").textContent="✏️ "+card.name;
  openM("m-tarjeta");
}
function saveTarjeta(){
  var id=parseInt(document.getElementById("tc-id").value);

  card.bal=pf(document.getElementById("tc-bal").value)||card.bal;
  card.lim=pf(document.getElementById("tc-lim").value)||card.lim;
  card.min=pf(document.getElementById("tc-min").value)||card.min;
  card.due=document.getElementById("tc-due").value||card.due;
  save();closeM("m-tarjeta");renderFinanzas();renderResumen();
}

function bnk(k){
  if(k==="del") _bnkStr=_bnkStr.slice(0,-1);

  else{var d=_bnkStr.indexOf(".");if(d>=0&&_bnkStr.length-d>2)return;_bnkStr+=k;}
  subAmtVals["banco"]=parseFloat(_bnkStr)||0;
  var el=document.getElementById("banco-display");

var dfStr={total:"",bal:""};

  var others=["total","bal"];
  others.forEach(function(f){
    if(f!==field){var o=document.getElementById("df-"+f+"-np");if(o)o.style.display="none";}
  });
  var np=document.getElementById("df-"+field+"-np");
  if(np) np.style.display=np.style.display==="none"?"block":"none";
}
function dfNk(field,k){
  var s=dfStr[field];

  else{var d=s.indexOf(".");if(d>=0&&s.length-d>2)return;s+=k;}
  dfStr[field]=s;
  subAmtVals["df-"+field]=parseFloat(s)||0;
  var el=document.getElementById("df-"+field+"-display");
  if(el) el.textContent="$"+(s||"0.00");
}
function saveBanco(){
  var acct=document.getElementById("banco-cuenta").value;
  var tipo=document.getElementById("banco-tipo").value;
  var amt=subAmtVals["banco"]||0;
  var nota=document.getElementById("banco-nota").value;

  S.txns.unshift({id:Date.now(),acct:acct,type:tipo,amt:amt,note:nota||(tipo==="dep"?"Depósito":"Retiro"),date:today()});

  save();closeM("m-banco");renderFinanzas();renderResumen();

  sorted.forEach(function(g){
    var vencido=g.day>0&&g.day<td&&!g.paid;
    var hoy=g.day===td&&!g.paid;
    var color=g.paid?"#1b5e20":vencido?"#b71c1c":hoy?"#e65100":"#1e3a6e";
    var badge=g.paid?'<span class="badge" style="background:#1b5e20;color:#a5d6a7;">✅ Pagado</span>':vencido?'<span class="badge" style="background:#b71c1c;color:#ffcdd2;">⚠️ Vencido</span>':hoy?'<span class="badge" style="background:#e65100;color:#ffe0b2;">📅 Hoy</span>':"";
    h+='<div class="c" style="border-color:'+color+';margin-bottom:8px;">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
    h+='<div style="flex:1;"><div style="font-size:13px;font-weight:700;margin-bottom:3px;">'+g.name+' '+badge+'</div>';
    h+='<div style="font-size:10px;color:#546e7a;">'+(g.day>0?"Día "+g.day:"Sin fecha")+" · "+g.cat+'</div>';
    if(g.abono>0&&!g.paid)h+='<div style="font-size:10px;color:#ffa726;margin-top:2px;">Abonado: '+fmt(g.abono)+' / Resta: '+fmt(g.amt-g.abono)+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;">';
    h+='<div style="font-size:17px;font-weight:800;color:'+(g.paid?"#66bb6a":"#ef5350")+';">'+fmt(g.amt)+'</div>';
    h+='<div style="display:flex;gap:4px;margin-top:5px;justify-content:flex-end;">';
    if(!g.paid){
      h+='<button class="btn-sm" style="background:#1b5e20;" onclick="pagarGasto('+g.id+')">💰</button>';
      h+='<button class="btn-sm" style="background:#1565c0;" onclick="abonarGasto('+g.id+')">💳</button>';
    } else {
      h+='<button class="btn-sm" style="background:#546e7a;" onclick="unpagarGasto('+g.id+')">↩️</button>';
    }
    h+='<button class="btn-sm" style="background:#37474f;" onclick="openGasto('+g.id+')">✏️</button>';
    h+='<button class="btn-sm btn-red" onclick="delGasto('+g.id+')">✕</button>';
    h+='</div></div></div></div>';
  });
  document.getElementById("pg-gastos").innerHTML=h;
}

function openGasto(id){
  var g=id?arrFind(S.gastos,function(x){return x.id===id;}):null;
  document.getElementById("m-gasto-title").textContent=g?"✏️ Editar gasto":"+ Gasto fijo";
  document.getElementById("gf-id").value=g?g.id:"";
  document.getElementById("gf-name").value=g?g.name:"";
  document.getElementById("gf-day").value=g?g.day:"";
  document.getElementById("gf-cat").value=g?g.cat:"Hogar";
  subAmtVals["gf"]=g?g.amt:0;
  document.getElementById("gf-display").textContent=g?fmt(g.amt):"$0.00";
  openM("m-gasto");
}
function saveGasto(){
  var id=document.getElementById("gf-id").value;
  var name=document.getElementById("gf-name").value;
  var amt=subAmtVals["gf"]||0;
  var day=parseInt(document.getElementById("gf-day").value)||0;
  var cat=document.getElementById("gf-cat").value;
  if(!name||!amt)return;
  if(id){var g=arrFind(S.gastos,function(x){return x.id==id;});if(g){g.name=name;g.amt=amt;g.day=day;g.cat=cat;}}
  else S.gastos.push({id:Date.now(),name:name,amt:amt,day:day,cat:cat,paid:false,abono:0});
  save();closeM("m-gasto");renderGastos();
}
function delGasto(id){S.gastos=arrFilter(S.gastos,function(x){return x.id!==id;});save();renderGastos();}
function pagarGasto(id){
  var g=arrFind(S.gastos,function(x){return x.id===id;});if(!g)return;
  var monto=g.amt-(g.abono||0);
  S.checking-=monto;
  S.txns.unshift({id:Date.now(),acct:"chk",type:"wit",amt:monto,note:"Pago: "+g.name,date:today()});
  g.paid=true;g.abono=g.amt;
  save();renderGastos();renderResumen();
}
function abonarGasto(id){
  var g=arrFind(S.gastos,function(x){return x.id===id;});if(!g)return;
  openPago("Abonar: "+g.name,"Se descuenta de BofA Checking",function(v){
    g.abono=(g.abono||0)+v;
    if(g.abono>=g.amt){g.paid=true;g.abono=g.amt;}
    S.checking-=v;
    S.txns.unshift({id:Date.now(),acct:"chk",type:"wit",amt:v,note:"Abono: "+g.name,date:today()});
    save();renderGastos();renderResumen();
  });
}
function unpagarGasto(id){
  var g=arrFind(S.gastos,function(x){return x.id===id;});if(!g)return;
  g.paid=false;g.abono=0;save();renderGastos();
}

// Historial
var histOpen={};
function compartirSemana(i){
  var hh=S.history[i];
  if(!hh)return;
  var d=new Date(hh.week).toLocaleDateString("es-US",{month:"short",day:"numeric",year:"numeric"});
  var nl="\n";
  var txt="📊 *Semana del "+d+"*"+nl+nl;
  if(hh.gabino>0) txt+="🚗 *Gabino:* +$"+hh.gabino.toFixed(2)+nl;
  txt+="📦 *Amazon / Instacart:* $"+hh.toChk.toFixed(2)+nl;
  txt+="⏱ Horas Amazon: "+hh.hw+"h"+nl+nl;
  if(hh.bofaMovs&&hh.bofaMovs.length>0){
    txt+="🏦 *Movimientos BofA:*"+nl;
    hh.bofaMovs.forEach(function(t){
      var isGabino=t.note&&t.note.toLowerCase().indexOf("gabino")>=0;
      var ico=isGabino?"🚗":t.type==="dep"?"⬆️":"⬇️";
      var prefix=t.type==="dep"?"+":"-";
      txt+="  "+ico+" "+(t.note||"Movimiento")+": "+prefix+"$"+t.amt.toFixed(2)+nl;
    });
    txt+=nl;
  }
  var hayPagos=(hh.cardPagos&&hh.cardPagos.length)||(hh.deudaPagos&&hh.deudaPagos.length)||(hh.gastosPagados&&hh.gastosPagados.length);
  if(hayPagos){
    txt+="💳 *Pagos realizados:*"+nl;
    (hh.cardPagos||[]).forEach(function(p){txt+="  💳 "+p.note+": -$"+p.amt.toFixed(2)+nl;});
    (hh.deudaPagos||[]).forEach(function(p){txt+="  💸 "+p.note+": -$"+p.amt.toFixed(2)+nl;});
    (hh.gastosPagados||[]).forEach(function(p){txt+="  📋 "+p.note+": -$"+p.amt.toFixed(2)+nl;});
  }
  var url="https://wa.me/?text="+encodeURIComponent(txt);
  window.open(url,"_blank");
}

// Cerrar semana
function openSemana(){
  var c=calc();
  var h='<div class="modal-title">🌙 Cerrar Semana</div>';
  h+='<div style="font-size:11px;color:#546e7a;margin-bottom:12px;">'+c.hw+'h trabajadas esta semana</div>';

  // Ingresos
  var gabinoAmt=0;
  arrFilter(S.txns||[],function(t){return t.type==="dep"&&t.note&&t.note.toLowerCase().indexOf("gabino")>=0;}).forEach(function(t){gabinoAmt+=t.amt;});
  h+='<div style="background:#0a1a0a;border-radius:10px;padding:12px;margin-bottom:8px;">';
  h+='<div style="font-size:10px;color:#64b5f6;font-weight:700;margin-bottom:6px;">🏦 Bank of America (+)</div>';
  h+=mr("Amazon neto",fmt(c.an),"#42a5f5")+mr("Instacart neto",fmt(c.iN),"#26c6da")+mr("Carry-over",fmt(c.co),"#ef9a9a");
  if(gabinoAmt>0) h+=mr("🚗 Gabino",fmt(gabinoAmt),"#66bb6a");
  h+='<div style="border-top:1px solid #1e3a6e;margin:6px 0;"></div>'+mr("TOTAL → BofA",fmt(c.toChk),"#66bb6a",true)+'</div>';

  h+='<div style="background:#0a0a1a;border-radius:10px;padding:12px;margin-bottom:'+(c.aig>0?"8":"8")+'px;">';
  h+='<div style="font-size:10px;color:#ce93d8;font-weight:700;margin-bottom:6px;">💰 Capital One Savings (+)</div>';
  h+=mr("Ahorro 20% Amazon",fmt(c.as2),"#ffa726")+mr("Ahorro 20% Instacart",fmt(c.is2),"#ffa726")+mr("Propinas",fmt(c.at+c.ct),"#ab47bc");
  h+='<div style="border-top:1px solid #1e3a6e;margin:6px 0;"></div>'+mr("TOTAL → Cap One",fmt(c.toCap),"#ab47bc",true)+'</div>';

  if(c.aig>0) h+='<div style="background:#1a0a00;border-radius:8px;padding:8px;margin-bottom:8px;font-size:11px;color:#ffa726;">⚡ '+fmt(c.aig*.8)+' pasa a siguiente semana</div>';

  // Movimientos BofA
  var bofa_txns=arrFilter(S.txns||[],function(t){return t.acct==="chk";});
  var bofa_deps=0,bofa_wits=0;
  bofa_txns.forEach(function(t){if(t.type==="dep")bofa_deps+=t.amt;else bofa_wits+=t.amt;});
  if(bofa_txns.length>0){
    h+='<div style="background:#0a1428;border-radius:10px;padding:12px;margin-bottom:8px;">';
    h+='<div style="font-size:10px;color:#64b5f6;font-weight:700;margin-bottom:6px;">🏦 Movimientos BofA esta semana</div>';
    bofa_txns.forEach(function(t){
      var isGabino=t.note&&t.note.toLowerCase().indexOf("gabino")>=0;
      var col=t.type==="dep"?"#66bb6a":"#ef5350";
      var prefix=t.type==="dep"?"+":"-";
      var ico=isGabino?"🚗":t.type==="dep"?"⬆️":"⬇️";
      h+=mr(ico+" "+(t.note||"Movimiento"),prefix+fmt(t.amt),col);
    });
    h+='<div style="border-top:1px solid #1e3a6e;margin:6px 0;"></div>';
    h+=mr("Total entradas",fmt(bofa_deps),"#66bb6a");
    h+=mr("Total salidas",fmt(bofa_wits),"#ef5350");
    h+=mr("Neto BofA",fmt(bofa_deps-bofa_wits),(bofa_deps-bofa_wits)>=0?"#66bb6a":"#ef5350",true);
    h+='</div>';
  }

  // Pagos y abonos de la semana
  var pagos=arrFilter(S.txns||[],function(t){return t.type==="wit";});
  var cardPagos=arrFilter(S.card_txns||[],function(t){return t.type==="pay";});
  if(pagos.length>0||cardPagos.length>0){
    h+='<div style="background:#0a0a1a;border-radius:10px;padding:12px;margin-bottom:8px;">';
    h+='<div style="font-size:10px;color:#ffa726;font-weight:700;margin-bottom:6px;">📋 Pagos y abonos esta semana</div>';
    cardPagos.forEach(function(t){
      h+=mr("💳 "+t.note,fmt(t.amt),"#66bb6a");
    });
    var deudaPagos=arrFilter(pagos,function(t){return t.note&&t.note.indexOf("deuda")>=0||t.note&&t.note.indexOf("Abono")>=0||t.note&&t.note.indexOf("Pago deuda")>=0;});
    deudaPagos.forEach(function(t){
      h+=mr("💸 "+t.note,fmt(t.amt),"#ab47bc");
    });
    if(cardPagos.length===0&&deudaPagos.length===0){
      h+='<div style="font-size:11px;color:#546e7a;text-align:center;">Sin pagos registrados</div>';
    }
    h+='</div>';
  }

  h+='<div class="modal-row"><button class="btn btn-gray" style="margin-top:0;" onclick="closeM(\'m-semana\')">Cancelar</button><button class="btn btn-green" style="margin-top:0;" onclick="doSemana()">Confirmar ✓</button></div>';
  document.getElementById("m-semana-body").innerHTML=h;
  openM("m-semana");
}

function mr(l,v,col,bold){return '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;"><span style="color:#90caf9;">'+l+'</span><span style="color:'+col+';font-weight:'+(bold?700:400)+';">'+v+'</span></div>';}
function doSemana(){
  var c=calc();
  var cardPagos=arrFilter(S.card_txns||[],function(t){return t.type==="pay";}).map(function(t){return {note:t.note,amt:t.amt};});
  var deudaPagos=arrFilter(S.txns||[],function(t){return t.type==="wit"&&t.note&&(t.note.indexOf("Pago deuda")>=0||t.note.indexOf("Abono")>=0);}).map(function(t){return {note:t.note,amt:t.amt};});
  var gastosPagados=arrFilter(S.txns||[],function(t){return t.type==="wit"&&t.note&&(t.note.indexOf("Pago:")>=0||t.note.indexOf("Abono:")>=0)&&t.note.indexOf("deuda")<0;}).map(function(t){return {note:t.note,amt:t.amt};});
  var gabinoTotal=0;
  arrFilter(S.txns||[],function(t){return t.type==="dep"&&t.note&&t.note.toLowerCase().indexOf("gabino")>=0;}).forEach(function(t){gabinoTotal+=t.amt;});
  var bofaMovs=arrFilter(S.txns||[],function(t){return t.acct==="chk";}).map(function(t){return {type:t.type,amt:t.amt,note:t.note||"",date:t.date||""};});
  S.history.unshift({week:S.week_start,an:c.an,as2:c.as2,iN:c.iN,is2:c.is2,tips:c.at+c.ct,co:c.co,toChk:c.toChk,toCap:c.toCap,hw:c.hw,cardPagos:cardPagos,deudaPagos:deudaPagos,gastosPagados:gastosPagados,gabino:gabinoTotal,bofaMovs:bofaMovs,bofaFinal:S.checking});
  S.checking+=c.toChk;S.savings+=c.toCap;
  S.amazon=[];S.instacart=[];S.future=[];
  S.carry_net=c.aig*.8;S.carry_tips=c.ait;
  S.week_start=new Date().toISOString();
  S.gastos.forEach(function(g){g.paid=false;g.abono=0;});
  histOpen={};save();closeM("m-semana");renderResumen();
}

// Auto-reset gastos on new month
(function(){
  var now=new Date();
  var thisMonth=now.getFullYear()+"-"+(now.getMonth()+1);
  if(S.last_month_reset!==thisMonth){
    S.gastos.forEach(function(g){g.paid=false;g.abono=0;});
    S.last_month_reset=thisMonth;save();
  }
})();

try{renderResumen();}catch(e){document.getElementById("pg-resumen").innerHTML='<div style="color:red;padding:20px;">Error: '+e.message+'</div>';}
</script>
