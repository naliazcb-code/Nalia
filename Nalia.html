<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nalia"/>
<meta name="theme-color" content="#0d47a1"/>
<title>Nalia</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0f1e;color:#e2e8f0;font-family:-apple-system,system-ui,sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:40px;}
.hdr{background:linear-gradient(135deg,#1a237e,#0d47a1);padding:20px 16px 12px;position:sticky;top:0;z-index:10;}
.tabs{display:flex;overflow-x:auto;background:#0d1b3e;border-bottom:1px solid #1e3a6e;}
.tab{flex:0 0 auto;padding:10px 14px;font-size:11px;font-weight:600;background:transparent;color:#64b5f6;border:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;}
.tab.on{background:#1565c0;color:#fff;border-bottom:2px solid #42a5f5;}
.pg{padding:16px;display:none;}
.pg.on{display:block;}
.card{background:#0d1b3e;border-radius:12px;padding:16px;border:1px solid #1e3a6e;margin-bottom:12px;}
.lbl{font-size:11px;color:#64b5f6;margin-bottom:6px;display:block;margin-top:4px;}
.row{display:flex;gap:8px;margin-bottom:12px;}
.tbtn{flex:1;padding:11px;border-radius:8px;border:none;font-weight:600;font-size:13px;color:#fff;background:#1a2744;cursor:pointer;}
.tbtn.bl{background:#1565c0;}
.tbtn.tl{background:#00695c;}
.tbtn.gn{background:#1b5e20;}
.tbtn.or{background:#e65100;}
.hbtn{padding:9px 14px;border-radius:8px;border:none;font-weight:700;font-size:14px;background:#1a2744;color:#90caf9;cursor:pointer;margin:0 4px 8px 0;}
.hbtn.on{background:#1565c0;color:#fff;}
.dbtn{padding:8px 12px;border-radius:8px;border:none;font-weight:700;font-size:13px;background:#1a2744;color:#90caf9;cursor:pointer;margin:0 4px 8px 0;}
.dbtn.on{background:#1565c0;color:#fff;}
.bigbtn{width:100%;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;}
.bar{background:#1a2744;border-radius:6px;height:8px;overflow:hidden;margin:6px 0;}
.barfill{height:8px;border-radius:6px;}
.brow{padding:10px 0;border-bottom:1px solid #0a1428;display:flex;justify-content:space-between;align-items:flex-start;}
.abtn{border:none;border-radius:6px;color:#fff;padding:6px 10px;font-size:12px;cursor:pointer;margin-left:6px;}
.stitle{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.sbox{background:#0a1428;border-radius:10px;padding:12px;}
.sbox .slbl{font-size:10px;color:#64b5f6;margin-bottom:4px;text-transform:uppercase;}
.sbox .sval{font-size:17px;font-weight:700;}
.pend{font-size:11px;color:#ffa726;padding:6px 8px;background:#1a1000;border-radius:6px;margin-bottom:8px;}
select{width:100%;background:#0a1428;border:1px solid #1e3a6e;border-radius:8px;padding:11px 12px;font-size:14px;color:#e2e8f0;margin-bottom:10px;-webkit-appearance:none;outline:none;}
/* Amount picker */
.amt-box{display:flex;align-items:center;background:#0a1428;border:2px solid #1e3a6e;border-radius:10px;margin-bottom:12px;overflow:hidden;}
.amt-box.focus{border-color:#1565c0;}
.amt-minus,.amt-plus{background:#1a2744;border:none;color:#e2e8f0;font-size:22px;font-weight:700;padding:14px 18px;cursor:pointer;flex:0 0 auto;-webkit-tap-highlight-color:transparent;}
.amt-minus:active,.amt-plus:active{background:#1565c0;}
.amt-val{flex:1;text-align:center;font-size:26px;font-weight:800;color:#e2e8f0;padding:14px 4px;cursor:pointer;-webkit-user-select:none;}
.amt-inp{flex:1;background:transparent;border:none;outline:none;font-size:26px;font-weight:800;color:#e2e8f0;text-align:center;padding:14px 4px;width:100%;display:none;-webkit-appearance:none;}
.errmsg{background:#b71c1c;color:#fff;border-radius:8px;padding:10px;margin-top:8px;font-size:13px;font-weight:600;display:none;}
.errmsg.on{display:block;}
.inp{width:100%;background:#0a1428;border:1px solid #1e3a6e;border-radius:8px;padding:12px;font-size:16px;color:#e2e8f0;display:block;margin-bottom:10px;-webkit-appearance:none;outline:none;}
</style>
</head>
<body>

<div class="hdr">
  <div style="font-size:20px;font-weight:800;letter-spacing:2px;">NALIA</div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;">
    <div style="font-size:11px;color:#90caf9;" id="hdrDate"></div>
    <div id="hdrPend" style="background:#ffa726;color:#000;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;display:none;"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="showTab('dash')">📊 Resumen</button>
  <button class="tab" onclick="showTab('reg')">➕ Registrar</button>
  <button class="tab" onclick="showTab('bank')">🏦 Cuentas</button>
  <button class="tab" onclick="showTab('cards')">💳 Tarjetas</button>
  <button class="tab" onclick="showTab('hist')">📅 Historial</button>
</div>

<!-- DASHBOARD -->
<div id="pg-dash" class="pg on">
  <div class="card" id="dash-hours"></div>
  <div class="card" id="dash-week"></div>
  <div style="background:#0a1a0a;border-radius:12px;padding:16px;border:1px solid #1b5e20;margin-bottom:12px;" id="dash-transfer"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;" id="dash-balances"></div>
  <div style="background:#1a0a0a;border-radius:12px;padding:16px;border:1px solid #4a1a1a;margin-bottom:12px;" id="dash-debt"></div>
  <button class="bigbtn" style="background:linear-gradient(135deg,#1b5e20,#2e7d32);" onclick="openWeekModal()">🌙 Cerrar Semana (Domingo)</button>
</div>

<!-- REGISTER -->
<div id="pg-reg" class="pg">
  <div class="card">
    <div class="stitle" style="color:#64b5f6;">Nuevo Bloque</div>

    <div class="row">
      <button class="tbtn bl" id="btn-amazon" onclick="setType('amazon')">📦 Amazon</button>
      <button class="tbtn" id="btn-instacart" onclick="setType('instacart')">🛒 Instacart</button>
    </div>

    <div class="row" id="future-row">
      <button class="tbtn bl" id="btn-hecho" onclick="setFuture(false)">✅ Bloque hecho</button>
      <button class="tbtn" id="btn-futuro" onclick="setFuture(true)">📅 Bloque futuro</button>
    </div>

    <span class="lbl" id="lbl-monto">Monto Bruto ($)</span>
    <div class="amt-box" id="gross-box">
      <button class="amt-minus" onclick="changeAmt('gross',-1)">−</button>
      <div class="amt-val" id="gross-val" onclick="editAmt('gross')">0.00</div>
      <input class="amt-inp" id="gross-inp" type="number" inputmode="decimal" step="0.50" min="0" onblur="stopEditAmt('gross')" oninput="syncAmt('gross')"/>
      <button class="amt-plus" onclick="changeAmt('gross',1)">+</button>
    </div>

    <span class="lbl">Día</span>
    <div id="day-btns" style="margin-bottom:4px;"></div>

    <div id="hours-section">
      <span class="lbl" id="lbl-hours">Horas</span>
      <div id="hour-btns" style="margin-bottom:4px;"></div>
    </div>

    <div id="tips-section" style="display:none;">
      <span class="lbl" id="lbl-tips">Propinas (~24h para llegar)</span>
      <div class="row">
        <button class="tbtn gn" id="btn-tips-disp" onclick="setTipsPd(false)">💵 Disponible</button>
        <button class="tbtn" id="btn-tips-pend" onclick="setTipsPd(true)">⏳ Pendiente</button>
      </div>
      <div class="amt-box" id="tips-box">
        <button class="amt-minus" onclick="changeAmt('tips',-0.5)">−</button>
        <div class="amt-val" id="tips-val" onclick="editAmt('tips')">0.00</div>
        <input class="amt-inp" id="tips-inp" type="number" inputmode="decimal" step="0.50" min="0" onblur="stopEditAmt('tips')" oninput="syncAmt('tips')"/>
        <button class="amt-plus" onclick="changeAmt('tips',0.5)">+</button>
      </div>
      <div class="pend" id="tips-pend-msg" style="display:none;">⏳ Edita el bloque cuando lleguen las propinas</div>
    </div>
    <div class="pend" id="no-tips-msg" style="display:none;color:#546e7a;background:#0a1428;">Las propinas solo aplican a bloques de 1h</div>

    <div id="instant-row" style="display:none;align-items:center;gap:8px;padding:10px;background:#1a1000;border-radius:8px;margin-bottom:10px;margin-top:4px;">
      <input type="checkbox" id="chk-instant"/>
      <label for="chk-instant" style="font-size:12px;color:#ffa726;">⚡ Retiro instantáneo (pasa a semana siguiente)</label>
    </div>

    <button class="bigbtn" id="btn-add" style="background:linear-gradient(135deg,#1565c0,#0d47a1);" onclick="addBlock()">+ Agregar Bloque</button>
    <div class="errmsg" id="err-msg"></div>
  </div>

  <div class="card" id="hours-bar-card" style="display:none;"></div>
  <div id="future-list"></div>
  <div id="amazon-list"></div>
  <div id="instacart-list"></div>
</div>

<!-- BANK -->
<div id="pg-bank" class="pg">
  <div class="card" id="bank-bofa"></div>
  <div style="background:#1a0d2b;border-radius:12px;padding:16px;border:1px solid #4a1a6e;margin-bottom:12px;" id="bank-cap"></div>
  <div class="card">
    <div class="stitle" style="color:#64b5f6;">Movimiento Manual</div>
    <span class="lbl">Cuenta</span>
    <select id="sel-acct"><option value="chk">🏦 BofA Checking</option><option value="sav">💰 Capital One Savings</option></select>
    <span class="lbl">Tipo</span>
    <select id="sel-type"><option value="dep">⬆️ Depósito</option><option value="wit">⬇️ Retiro</option></select>
    <span class="lbl">Monto ($)</span>
    <div class="amt-box">
      <button class="amt-minus" onclick="changeAmt('bank',-10)">−</button>
      <div class="amt-val" id="bank-val" onclick="editAmt('bank')">0.00</div>
      <input class="amt-inp" id="bank-inp" type="number" inputmode="decimal" step="1" min="0" onblur="stopEditAmt('bank')" oninput="syncAmt('bank')"/>
      <button class="amt-plus" onclick="changeAmt('bank',10)">+</button>
    </div>
    <button class="bigbtn" style="background:linear-gradient(135deg,#1565c0,#0d47a1);" onclick="bankTx()">Registrar</button>
  </div>
</div>

<!-- CARDS -->
<div id="pg-cards" class="pg"><div id="cards-list"></div></div>

<!-- HISTORY -->
<div id="pg-hist" class="pg"><div id="hist-list"></div></div>

<!-- MODAL WEEK -->
<div id="modal-week" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;padding:20px;align-items:center;justify-content:center;">
  <div style="background:#0d1b3e;border-radius:16px;padding:24px;width:100%;max-width:360px;border:1px solid #1565c0;">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px;">🌙 Cerrar Semana</div>
    <div id="modal-week-body"></div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button style="flex:1;background:#1a2744;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;" onclick="closeModal()">Cancelar</button>
      <button style="flex:1;background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;" onclick="doCloseWeek()">Confirmar ✓</button>
    </div>
  </div>
</div>

<!-- MODAL EDIT -->
<div id="modal-edit" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;padding:20px;align-items:center;justify-content:center;">
  <div style="background:#0d1b3e;border-radius:16px;padding:24px;width:100%;max-width:360px;border:1px solid #1565c0;">
    <div style="font-size:16px;font-weight:700;margin-bottom:12px;">✏️ Editar Bloque</div>
    <span class="lbl">Monto Bruto ($)</span>
    <div class="amt-box">
      <button class="amt-minus" onclick="changeAmt('edit-gross',-1)">−</button>
      <div class="amt-val" id="edit-gross-val" onclick="editAmt('edit-gross')">0.00</div>
      <input class="amt-inp" id="edit-gross-inp" type="number" inputmode="decimal" step="0.50" min="0" onblur="stopEditAmt('edit-gross')" oninput="syncAmt('edit-gross')"/>
      <button class="amt-plus" onclick="changeAmt('edit-gross',1)">+</button>
    </div>
    <div id="edit-hours-sec"></div>
    <div id="edit-tips-sec"></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button style="flex:1;background:#1a2744;color:#fff;border:none;border-radius:10px;padding:12px;font-weight:600;cursor:pointer;" onclick="closeModal()">Cancelar</button>
      <button style="flex:1;background:linear-gradient(135deg,#1565c0,#0d47a1);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer;" onclick="saveEdit()">Guardar ✓</button>
    </div>
  </div>
</div>

<script>
var SK="nalia_v7";
var AH=[1,1.5,2,3,3.5,4,4.5];
var DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MAX_H=40;
var DS={checking:0,savings:0,amazon:[],future:[],instacart:[],carry_net:0,carry_tips:0,
  cards:[
    {id:1,name:"Bank of America",bal:3122.35,lim:3000,min:311,due:"Jul 14",over:168},
    {id:2,name:"Capital One (1)",bal:691.05,lim:600,min:27,due:"Jul 6",over:0},
    {id:3,name:"Capital One (2)",bal:1463.76,lim:1700,min:52,due:"Jun 20",over:0}
  ],week_start:new Date().toISOString(),history:[]};

function load(){try{var s=localStorage.getItem(SK);return s?Object.assign(JSON.parse(JSON.stringify(DS)),JSON.parse(s)):JSON.parse(JSON.stringify(DS));}catch(e){return JSON.parse(JSON.stringify(DS));}}
function save(){try{localStorage.setItem(SK,JSON.stringify(st));}catch(e){}}
function fmt(n){return"$"+(+(n||0)).toFixed(2);}
function pf(v){return Math.round(parseFloat(String(v||0).replace(",","."))*100)/100||0;}
function todayStr(){return new Date().toLocaleDateString("es-US",{weekday:"short",month:"short",day:"numeric"});}
function isSun(){return new Date().getDay()===0;}

var st=load();
var fType="amazon",fFuture=false,fDay=null,fHours=null,fTipsPd=false;
var amts={gross:0,tips:0,bank:0,"edit-gross":0,"edit-tips":0};
var editId=null,editType=null,editHours=null,editTipsPd=false;

// Amount control
function changeAmt(key,delta){
  amts[key]=Math.max(0,Math.round((amts[key]+delta)*100)/100);
  var v=document.getElementById(key+"-val");
  if(v) v.textContent=amts[key].toFixed(2);
}
function editAmt(key){
  var v=document.getElementById(key+"-val");
  var i=document.getElementById(key+"-inp");
  if(!v||!i)return;
  v.style.display="none";
  i.style.display="block";
  i.value=amts[key]||"";
  i.focus();
  i.select();
}
function stopEditAmt(key){
  var v=document.getElementById(key+"-val");
  var i=document.getElementById(key+"-inp");
  if(!v||!i)return;
  amts[key]=Math.max(0,pf(i.value));
  v.textContent=amts[key].toFixed(2);
  v.style.display="block";
  i.style.display="none";
}
function syncAmt(key){
  var i=document.getElementById(key+"-inp");
  if(!i)return;
  amts[key]=Math.max(0,pf(i.value));
}

function calc(){
  var ab=0,at=0,aig=0,ait=0;
  for(var i=0;i<st.amazon.length;i++){
    var b=st.amazon[i];
    if(b.instant){aig+=b.gross;ait+=(b.tipsPd?0:(b.tips||0));}
    else{ab+=b.gross;at+=(b.tipsPd?0:(b.tips||0));}
  }
  var ig=0; for(var i=0;i<st.instacart.length;i++) ig+=st.instacart[i].gross;
  var an=ab*0.8,as2=ab*0.2,iN=ig*0.8,is2=ig*0.2,tn=an+iN,ts=as2+is2;
  var co=st.carry_net||0,ct=st.carry_tips||0;
  var pd=0;
  for(var i=0;i<st.amazon.length;i++) if(st.amazon[i].tipsPd) pd++;
  for(var i=0;i<st.instacart.length;i++) if(st.instacart[i].tipsPd) pd++;
  var td=0; for(var i=0;i<st.cards.length;i++) td+=st.cards[i].bal;
  var hw=0; for(var i=0;i<st.amazon.length;i++) hw+=(st.amazon[i].hours||0);
  var hf=0; for(var i=0;i<st.future.length;i++) hf+=(st.future[i].hours||0);
  var hu=hw+hf,hl=Math.max(0,MAX_H-hu);
  return{an:an,as2:as2,at:at,aig:aig,ait:ait,iN:iN,is2:is2,tn:tn,ts:ts,
    co:co,ct:ct,toChk:tn+co,toCap:ts+at+ct,pd:pd,td:td,hw:hw,hf:hf,hu:hu,hl:hl};
}

function setType(t){
  fType=t;
  document.getElementById("btn-amazon").className="tbtn"+(t==="amazon"?" bl":"");
  document.getElementById("btn-instacart").className="tbtn"+(t==="instacart"?" tl":"");
  document.getElementById("future-row").style.display=t==="amazon"?"flex":"none";
  document.getElementById("hours-section").style.display=t==="amazon"?"block":"none";
  document.getElementById("lbl-tips").textContent=t==="amazon"?"Propinas (~24h para llegar)":"Propinas";
  updateTipsVis();updateInstantVis();updateHoursBar();
}
function setFuture(v){
  fFuture=v;
  document.getElementById("btn-hecho").className="tbtn"+(v?"":"bl");
  document.getElementById("btn-futuro").className="tbtn"+(v?"or":"");
  document.getElementById("lbl-monto").textContent=v?"Monto estimado ($)":"Monto Bruto ($)";
  document.getElementById("btn-add").textContent=v?"📅 Guardar Bloque Futuro":"+ Agregar Bloque";
  document.getElementById("btn-add").style.background=v?"linear-gradient(135deg,#e65100,#bf360c)":"linear-gradient(135deg,#1565c0,#0d47a1)";
  updateInstantVis();
}
function setDay(d){
  fDay=d;
  document.querySelectorAll(".dbtn").forEach(function(b,i){b.className="dbtn"+(i===d?" on":"");});
}
function setHours(h){
  fHours=h;
  document.querySelectorAll(".hbtn").forEach(function(b){b.className="hbtn"+(parseFloat(b.dataset.h)===h?" on":"");});
  updateTipsVis();updateInstantVis();
}
function setTipsPd(v){
  fTipsPd=v;
  document.getElementById("btn-tips-disp").className="tbtn"+(v?"":"gn");
  document.getElementById("btn-tips-pend").className="tbtn"+(v?"or":"");
  var tb=document.getElementById("tips-box");
  var tp=document.getElementById("tips-pend-msg");
  if(tb) tb.style.display=v?"none":"flex";
  if(tp) tp.style.display=v?"block":"none";
}
function updateTipsVis(){
  var show=fType==="instacart"||(fType==="amazon"&&fHours===1);
  document.getElementById("tips-section").style.display=show?"block":"none";
  document.getElementById("no-tips-msg").style.display=(!show&&fType==="amazon")?"block":"none";
  if(!show){amts.tips=0;document.getElementById("tips-val").textContent="0.00";}
}
function updateInstantVis(){
  var show=fType==="amazon"&&isSun()&&!fFuture;
  document.getElementById("instant-row").style.display=show?"flex":"none";
}
function updateHoursBar(){
  var c=calc();
  var card=document.getElementById("hours-bar-card");
  if(fType!=="amazon"){card.style.display="none";return;}
  card.style.display="block";
  var pct=Math.min(100,(c.hu/MAX_H)*100);
  var col=pct>=90?"#ef5350":pct>=70?"#ffa726":"#66bb6a";
  card.innerHTML='<div style="display:flex;justify-content:space-around;margin-bottom:8px;">'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#42a5f5;">HECHOS</div><div style="font-size:18px;font-weight:800;color:#42a5f5;">'+c.hw+'h</div></div>'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#ffa726;">PROG.</div><div style="font-size:18px;font-weight:800;color:#ffa726;">'+c.hf+'h</div></div>'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#66bb6a;">LIBRES</div><div style="font-size:18px;font-weight:800;color:#66bb6a;">'+c.hl+'h</div></div>'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#546e7a;">MAX</div><div style="font-size:18px;font-weight:800;color:#546e7a;">'+MAX_H+'h</div></div>'+
    '</div><div class="bar"><div class="barfill" style="width:'+pct+'%;background:'+col+';"></div></div>'+
    '<div style="font-size:10px;color:#546e7a;text-align:right;margin-top:4px;">'+c.hu+'h de '+MAX_H+'h</div>';
  document.getElementById("lbl-hours").textContent="Horas ("+c.hl+"h libres)";
}

function showErr(msg){var el=document.getElementById("err-msg");el.textContent=msg;el.className="errmsg on";}
function clearErr(){document.getElementById("err-msg").className="errmsg";}

function addBlock(){
  clearErr();
  // Make sure any open input is committed
  var gi=document.getElementById("gross-inp");
  if(gi&&gi.style.display!=="none") stopEditAmt("gross");
  var ti=document.getElementById("tips-inp");
  if(ti&&ti.style.display!=="none") stopEditAmt("tips");

  var g=amts.gross;
  var t=fTipsPd?0:amts.tips;
  var dayLabel=fDay!==null?DAYS[fDay]:todayStr();

  if(fType==="amazon"&&fFuture){
    if(!fHours){showErr("⚠️ Selecciona las horas");return;}
    st.future.push({id:Date.now(),hours:fHours,gross:g,tips:t,tipsPd:fTipsPd,day:fDay});
    amts.gross=0;amts.tips=0;
    document.getElementById("gross-val").textContent="0.00";
    document.getElementById("tips-val").textContent="0.00";
    fHours=null;
    document.querySelectorAll(".hbtn").forEach(function(b){b.className="hbtn";});
    save();refreshLists();updateHoursBar();return;
  }
  if(!g||g<=0){showErr("⚠️ Ingresa el monto bruto");return;}
  if(fType==="amazon"&&!fHours){showErr("⚠️ Selecciona las horas");return;}

  var instant=fType==="amazon"&&isSun()&&document.getElementById("chk-instant").checked;
  var b={id:Date.now(),type:fType,gross:g,tips:t,tipsPd:fTipsPd,
    instant:instant,hours:fHours,day:fDay,date:dayLabel,ts:new Date().toISOString()};
  if(fType==="amazon") st.amazon.push(b); else st.instacart.push(b);

  amts.gross=0;amts.tips=0;
  document.getElementById("gross-val").textContent="0.00";
  document.getElementById("tips-val").textContent="0.00";
  fHours=null;
  document.querySelectorAll(".hbtn").forEach(function(b){b.className="hbtn";});
  save();refreshLists();updateHoursBar();refreshDash();
}

function doneFuture(id){
  var idx=-1;
  for(var i=0;i<st.future.length;i++) if(st.future[i].id===id){idx=i;break;}
  if(idx<0)return;
  var b=st.future[idx];
  st.future.splice(idx,1);
  if(b.gross>0){
    st.amazon.push({id:Date.now(),type:"amazon",gross:b.gross,tips:b.tips,tipsPd:b.tipsPd,
      instant:false,hours:b.hours,day:b.day,date:b.day!==null?DAYS[b.day]:todayStr(),ts:new Date().toISOString()});
  }
  save();refreshLists();updateHoursBar();refreshDash();
}
function delFuture(id){
  for(var i=0;i<st.future.length;i++) if(st.future[i].id===id){st.future.splice(i,1);break;}
  save();refreshLists();updateHoursBar();refreshDash();
}
function delBlock(type,id){
  var arr=type==="amazon"?st.amazon:st.instacart;
  for(var i=0;i<arr.length;i++) if(arr[i].id===id){arr.splice(i,1);break;}
  save();refreshLists();updateHoursBar();refreshDash();
}

function openEdit(type,id){
  var arr=type==="amazon"?st.amazon:st.instacart;
  var b=null;
  for(var i=0;i<arr.length;i++) if(arr[i].id===id){b=arr[i];break;}
  if(!b)return;
  editId=id;editType=type;editHours=b.hours;editTipsPd=b.tipsPd;
  amts["edit-gross"]=b.gross||0;
  document.getElementById("edit-gross-val").textContent=(b.gross||0).toFixed(2);

  var hs=document.getElementById("edit-hours-sec");

      (type==="amazon"?'<button class="tbtn'+(b.tipsPd?" or":"")+'" id="ebtn-p" onclick="setEditTipsPd(true)">⏳ Pendiente</button>':"")+
      '</div>'+
      (b.tipsPd?'<div class="pend">⏳ Pendiente</div>':
      '<div class="amt-box"><button class="amt-minus" onclick="changeAmt(\'edit-tips\',-0.5)">−</button>'+
      '<div class="amt-val" id="edit-tips-val" onclick="editAmt(\'edit-tips\')">'+(b.tips||0).toFixed(2)+'</div>'+
      '<input class="amt-inp" id="edit-tips-inp" type="number" inputmode="decimal" step="0.50" min="0" onblur="stopEditAmt(\'edit-tips\')" oninput="syncAmt(\'edit-tips\')"/>'+
      '<button class="amt-plus" onclick="changeAmt(\'edit-tips\',0.5)">+</button></div>');

function saveEdit(){
  var g=amts["edit-gross"];
  var t=editTipsPd?0:amts["edit-tips"];
  var arr=editType==="amazon"?st.amazon:st.instacart;
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===editId){
      if(g>0) arr[i].gross=g;
      arr[i].tips=t;arr[i].tipsPd=editTipsPd;
      if(editType==="amazon"&&editHours) arr[i].hours=editHours;
      break;
    }

  save();closeModal();refreshLists();refreshDash();

function bankTx(){
  var bi=document.getElementById("bank-inp");
  if(bi&&bi.style.display!=="none") stopEditAmt("bank");
  var amt=amts.bank;
  if(!amt||amt<=0)return;
  var acct=document.getElementById("sel-acct").value;
  var type=document.getElementById("sel-type").value;
  if(type==="dep"){if(acct==="chk")st.checking+=amt;else st.savings+=amt;}
  else{if(acct==="chk")st.checking-=amt;else st.savings-=amt;}
  amts.bank=0;document.getElementById("bank-val").textContent="0.00";
  save();refreshBank();refreshDash();
}
function payCard(id){
  var s=document.getElementById("pay-inp-"+id);
  if(!s)return;
  var amt=pf(s.value);
  if(!amt||amt<=0)return;
  st.savings-=amt;
  for(var i=0;i<st.cards.length;i++){
    if(st.cards[i].id===id){
      st.cards[i].bal=Math.max(0,st.cards[i].bal-amt);
      st.cards[i].over=Math.max(0,st.cards[i].over-amt);
      break;
    }
  }
  s.value="";save();refreshCards();refreshDash();refreshBank();
}

function showTab(id){
  var tabs=["dash","reg","bank","cards","hist"];
  document.querySelectorAll(".tab").forEach(function(t,i){t.className="tab"+(tabs[i]===id?" on":"");});
  tabs.forEach(function(t){document.getElementById("pg-"+t).className="pg"+(t===id?" on":"");});

  if(id==="cards") refreshCards();
  if(id==="hist") refreshHist();
}
function refreshAll(){refreshDash();refreshLists();refreshBank();refreshCards();refreshHist();updateHoursBar();}

// Init day buttons
(function(){
  var db=document.getElementById("day-btns");
  for(var i=0;i<DAYS.length;i++){
    var b=document.createElement("button");
    b.className="dbtn";b.textContent=DAYS[i];
    (function(idx){b.onclick=function(){setDay(idx);};})(i);
    db.appendChild(b);
  }
  setDay(new Date().getDay());
})();

// Init hour buttons
(function(){
  var hb=document.getElementById("hour-btns");
  for(var i=0;i<AH.length;i++){
    var b=document.createElement("button");
    b.className="hbtn";b.textContent=AH[i]+"h";b.dataset.h=AH[i];
    (function(h){b.onclick=function(){setHours(h);};})(AH[i]);
    hb.appendChild(b);
  }
})();

refreshAll();
updateTipsVis();
updateInstantVis();
</script>
</body>
