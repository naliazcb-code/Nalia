<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nalia"/>
<meta name="theme-color" content="#0d47a1"/>
<title>Nalia</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d47a1'/><text y='.9em' font-size='80' x='10'>💰</text></svg>"/>
<meta name="apple-touch-fullscreen" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0f1e;color:#e2e8f0;font-family:-apple-system,system-ui,sans-serif;max-width:480px;margin:0 auto;min-height:100vh;}
input,select{outline:none;color:#e2e8f0;background:#0a1428;border:1px solid #1e3a6e;border-radius:8px;padding:11px 12px;font-size:16px;width:100%;display:block;margin-bottom:10px;-webkit-appearance:none;}
button{-webkit-appearance:none;cursor:pointer;font-family:inherit;}
.card{background:#0d1b3e;border-radius:12px;padding:16px;border:1px solid #1e3a6e;margin-bottom:12px;}
.lbl{font-size:11px;color:#64b5f6;margin-bottom:6px;margin-top:4px;}
.stitle{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.row{display:flex;gap:8px;margin-bottom:12px;}
.tbtn{flex:1;padding:10px;border-radius:8px;border:none;font-weight:600;font-size:13px;color:#fff;background:#1a2744;}
.tbtn.on-blue{background:#1565c0;}
.tbtn.on-teal{background:#00695c;}
.tbtn.on-green{background:#1b5e20;}
.tbtn.on-orange{background:#e65100;}
.hbtn{padding:7px 12px;border-radius:8px;border:none;font-weight:700;font-size:13px;background:#1a2744;color:#90caf9;margin:0 4px 6px 0;}
.hbtn.on{background:#1565c0;color:#fff;}
.dbtn{padding:6px 10px;border-radius:8px;border:none;font-weight:700;font-size:12px;background:#1a2744;color:#90caf9;margin:0 4px 6px 0;}
.dbtn.on{background:#1565c0;color:#fff;}
.bigbtn{border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;color:#fff;width:100%;margin-top:4px;}
.preview{background:#0a2010;border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px;}
.brow{padding:10px 0;border-bottom:1px solid #0a1428;display:flex;justify-content:space-between;align-items:flex-start;}
.abtn{border:none;border-radius:6px;color:#fff;padding:5px 8px;font-size:11px;cursor:pointer;}
.bar{background:#1a2744;border-radius:6px;height:8px;overflow:hidden;}
.barfill{height:8px;border-radius:6px;}
.tab{flex:0 0 auto;padding:10px 14px;font-size:11px;font-weight:600;background:transparent;color:#64b5f6;border:none;border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;}
.tab.on{background:#1565c0;color:#fff;border-bottom:2px solid #42a5f5;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var SK="nalia_v5";
var AH=[1,1.5,2,3,3.5,4,4.5];
var DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MAX_H=40;
var DS={checking:0,savings:0,amazon:[],future:[],instacart:[],carry_net:0,carry_tips:0,
  cards:[
    {id:1,name:"Bank of America",bal:3122.35,lim:3000,min:311,due:"Jul 14",over:168},
    {id:2,name:"Capital One (1)",bal:691.05,lim:600,min:27,due:"Jul 6",over:0},
    {id:3,name:"Capital One (2)",bal:1463.76,lim:1700,min:52,due:"Jun 20",over:0}
  ],week_start:new Date().toISOString(),history:[]};

// Safe storage wrapper for Safari PWA
var _mem = null;
function load(){
  try{
    var s=localStorage.getItem(SK);
    if(s){var p=JSON.parse(s);return Object.assign(JSON.parse(JSON.stringify(DS)),p);}
    return JSON.parse(JSON.stringify(DS));
  }catch(e){
    if(_mem) return Object.assign(JSON.parse(JSON.stringify(DS)),_mem);
    return JSON.parse(JSON.stringify(DS));
  }
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify(st));_mem=JSON.parse(JSON.stringify(st));}
  catch(e){_mem=JSON.parse(JSON.stringify(st));}
}
function fmt(n){return"$"+(+(n||0)).toFixed(2);}
function pf(v){return parseFloat(String(v||"").replace(",","."))||0;}
function todayStr(){return new Date().toLocaleDateString("es-US",{weekday:"short",month:"short",day:"numeric"});}
function isSun(){return new Date().getDay()===0;}

var st=load();
var tab="dashboard";
var modal=null;
var editData=null;
var rf={type:"amazon",future:false,day:null,hours:null,gross:"",tips:"",tipsPd:false,instant:false,note:""};

function calc(){
  var ab=0,at=0,aig=0,ait=0;
  for(var i=0;i<st.amazon.length;i++){
    var b=st.amazon[i];
    if(b.instant){aig+=b.gross;ait+=(b.tipsPd?0:(b.tips||0));}
    else{ab+=b.gross;at+=(b.tipsPd?0:(b.tips||0));}
  }
  var ig=0;
  for(var i=0;i<st.instacart.length;i++) ig+=st.instacart[i].gross;
  var an=ab*0.8,as2=ab*0.2,iN=ig*0.8,is2=ig*0.2;
  var tn=an+iN,ts=as2+is2;
  var co=st.carry_net||0,ct=st.carry_tips||0;
  var pd=0;
  for(var i=0;i<st.amazon.length;i++) if(st.amazon[i].tipsPd) pd++;
  for(var i=0;i<st.instacart.length;i++) if(st.instacart[i].tipsPd) pd++;
  var td=0; for(var i=0;i<st.cards.length;i++) td+=st.cards[i].bal;
  var hw=0; for(var i=0;i<st.amazon.length;i++) hw+=(st.amazon[i].hours||0);
  var hf=0; for(var i=0;i<st.future.length;i++) hf+=(st.future[i].hours||0);
  var hu=hw+hf,hl=Math.max(0,MAX_H-hu);
  return{ab:ab,an:an,as2:as2,at:at,aig:aig,ait:ait,ig:ig,iN:iN,is2:is2,tn:tn,ts:ts,
    co:co,ct:ct,toChk:tn+co,toCap:ts+at+ct,pd:pd,td:td,hw:hw,hf:hf,hu:hu,hl:hl};
}

function addBlock(){
  // Read directly from DOM elements
  var gEl=document.getElementById("rfGross");
  var tEl=document.getElementById("rfTips");
  var gVal=gEl?gEl.value:"";
  var tVal=tEl?tEl.value:"";
  // Also check rf values as fallback
  if(!gVal&&rf.gross) gVal=rf.gross;
  if(!tVal&&rf.tips) tVal=rf.tips;
  rf.gross=gVal;
  rf.tips=tVal;
  var g=pf(gVal), t=rf.tipsPd?0:pf(tVal);
  var dayLabel=rf.day!==null?DAYS[rf.day]:todayStr();
  if(rf.type==="amazon"&&rf.future){
    if(!rf.hours){alert("Selecciona las horas");return;}
    st.future.push({id:Date.now(),hours:rf.hours,gross:g,tips:t,tipsPd:rf.tipsPd,day:rf.day,note:rf.note});
    rf.gross="";rf.tips="";rf.note="";rf.hours=null;
    save();render();return;
  }
  if(!g||g<=0){alert("Ingresa un monto válido");return;}
  if(rf.type==="amazon"&&!rf.hours){alert("Selecciona las horas");return;}
  var b={id:Date.now(),type:rf.type,gross:g,tips:t,tipsPd:rf.tipsPd,
    instant:rf.type==="amazon"&&isSun()&&rf.instant,
    hours:rf.hours,day:rf.day,note:rf.note,date:dayLabel,ts:new Date().toISOString()};
  if(rf.type==="amazon") st.amazon.push(b); else st.instacart.push(b);
  rf.gross="";rf.tips="";rf.note="";rf.hours=null;
  save();render();
}

function doneFuture(id){
  var idx=-1;
  for(var i=0;i<st.future.length;i++) if(st.future[i].id===id){idx=i;break;}
  if(idx<0)return;
  var b=st.future[idx];
  var dayLabel=b.day!==null&&b.day!==undefined?DAYS[b.day]:todayStr();
  st.future.splice(idx,1);
  if(b.gross>0){
    st.amazon.push({id:Date.now(),type:"amazon",gross:b.gross,tips:b.tips,tipsPd:b.tipsPd,
      instant:false,hours:b.hours,day:b.day,note:b.note||"",date:dayLabel,ts:new Date().toISOString()});
  } else {
    rf.type="amazon";rf.hours=b.hours;rf.day=b.day;rf.note=b.note||"";
    rf.tipsPd=b.tipsPd;rf.future=false;rf.gross="";rf.tips="";
    tab="register";
  }
  save();render();
}

function delFuture(id){
  if(!confirm("¿Eliminar bloque programado?"))return;
  for(var i=0;i<st.future.length;i++) if(st.future[i].id===id){st.future.splice(i,1);break;}
  save();render();
}

function delBlock(type,id){
  if(!confirm("¿Eliminar bloque?"))return;
  var arr=type==="amazon"?st.amazon:st.instacart;
  for(var i=0;i<arr.length;i++) if(arr[i].id===id){arr.splice(i,1);break;}
  save();render();
}

function openEdit(type,id){
  var arr=type==="amazon"?st.amazon:st.instacart;
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===id){
      editData=JSON.parse(JSON.stringify(arr[i]));
      editData.btype=type;
      editData.grossStr=String(arr[i].gross||"");
      editData.tipsStr=String(arr[i].tips||"");
      break;
    }
  }
  render();
}

function saveEdit(){
  if(!editData)return;
  var arr=editData.btype==="amazon"?st.amazon:st.instacart;
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===editData.id){
      arr[i].gross=pf(editData.grossStr)||arr[i].gross;
      arr[i].tips=editData.tipsPd?0:pf(editData.tipsStr);
      arr[i].tipsPd=editData.tipsPd;
      arr[i].hours=editData.hours;
      arr[i].note=editData.note||"";
      break;
    }
  }
  editData=null;save();render();
}

function closeWeek(){
  var c=calc();
  var prevC=st.checking,prevS=st.savings;
  var cards=JSON.parse(JSON.stringify(st.cards));
  var hist=JSON.parse(JSON.stringify(st.history||[]));
  hist.unshift({week:st.week_start,an:c.an,iN:c.iN,ts:c.ts,tips:c.at+c.ct,co:c.co,toChk:c.toChk,toCap:c.toCap,hw:c.hw});
  st=JSON.parse(JSON.stringify(DS));
  st.checking=prevC+c.toChk;
  st.savings=prevS+c.toCap;
  st.carry_net=c.aig*0.8;
  st.carry_tips=c.ait;
  st.cards=cards;
  st.week_start=new Date().toISOString();
  st.history=hist;
  modal=null;save();render();
}

function payCard(id){
  var s=prompt("¿Cuánto vas a pagar desde Capital One Savings?");
  if(!s)return;
  var amt=pf(s);
  if(!amt||amt<=0)return;
  st.savings-=amt;
  for(var i=0;i<st.cards.length;i++){
    if(st.cards[i].id===id){
      st.cards[i].bal=Math.max(0,st.cards[i].bal-amt);
      st.cards[i].over=Math.max(0,st.cards[i].over-amt);
      break;
    }
  }
  save();render();
}

function bankTx(){
  var acct=document.getElementById("bAcct").value;
  var type=document.getElementById("bType").value;
  var amt=pf(document.getElementById("bAmt").value);
  if(!amt||amt<=0){alert("Ingresa un monto válido");return;}
  if(type==="dep"){if(acct==="chk")st.checking+=amt;else st.savings+=amt;}
  else{if(acct==="chk")st.checking-=amt;else st.savings-=amt;}
  document.getElementById("bAmt").value="";
  save();render();
}

// ---- UI helpers (no inline onclick with quotes) ----
function h(tag,cls,style,inner){
  var s="<"+tag;
  if(cls) s+=' class="'+cls+'"';
  if(style) s+=' style="'+style+'"';
  s+=">"+inner+"</"+tag+">";
  return s;
}

function sbox(l,v,col){
  return '<div style="background:#0a1428;border-radius:10px;padding:12px;">'+
    '<div style="font-size:10px;color:#64b5f6;margin-bottom:4px;text-transform:uppercase;">'+l+'</div>'+
    '<div style="font-size:17px;font-weight:700;color:'+col+';">'+v+'</div></div>';
}

function rw(l,v,col,bold){
  return '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">'+
    '<span style="color:#90caf9;">'+l+'</span>'+
    '<span style="color:'+col+';font-weight:'+(bold?700:600)+';">'+v+'</span></div>';
}

function barHtml(pct,col){
  return '<div class="bar"><div class="barfill" style="width:'+pct+'%;background:'+col+';"></div></div>';
}

function hoursRow(c){
  var pct=Math.min(100,(c.hu/MAX_H)*100);
  var col=pct>=90?"#ef5350":pct>=70?"#ffa726":"#66bb6a";
  return '<div style="display:flex;justify-content:space-around;margin-bottom:8px;">'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#42a5f5;">HECHOS</div><div style="font-size:18px;font-weight:800;color:#42a5f5;">'+c.hw+'h</div></div>'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#ffa726;">PROG.</div><div style="font-size:18px;font-weight:800;color:#ffa726;">'+c.hf+'h</div></div>'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#66bb6a;">LIBRES</div><div style="font-size:18px;font-weight:800;color:#66bb6a;">'+c.hl+'h</div></div>'+
    '<div style="text-align:center;"><div style="font-size:10px;color:#546e7a;">MAX</div><div style="font-size:18px;font-weight:800;color:#546e7a;">'+MAX_H+'h</div></div>'+
    '</div>'+barHtml(pct,col)+
    '<div style="font-size:10px;color:#546e7a;text-align:right;margin-top:4px;">'+c.hu+'h de '+MAX_H+'h</div>';
}

function render(){
  var c=calc();
  var html="";

  // HEADER
  html+='<div style="background:linear-gradient(135deg,#1a237e,#0d47a1);padding:20px 16px 12px;position:sticky;top:0;z-index:10;">';
  html+='<div style="font-size:20px;font-weight:800;letter-spacing:2px;">NALIA</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;">';
  html+='<div style="font-size:11px;color:#90caf9;">'+todayStr()+' · Dom→Sáb</div>';
  if(c.pd>0) html+='<div style="background:#ffa726;color:#000;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;">⏳ '+c.pd+'</div>';
  html+='</div></div>';

  // TABS
  var tabs=[["dashboard","📊"],["register","➕"],["bank","🏦"],["cards","💳"],["history","📅"]];
  var tabLabels=["Resumen","Registrar","Cuentas","Tarjetas","Historial"];
  html+='<div style="display:flex;overflow-x:auto;background:#0d1b3e;border-bottom:1px solid #1e3a6e;">';
  for(var i=0;i<tabs.length;i++){
    html+='<button data-tab="'+tabs[i][0]+'" class="tab'+(tab===tabs[i][0]?" on":"")+'">';
    html+=tabs[i][1]+' '+tabLabels[i]+'</button>';
  }
  html+='</div>';
  html+='<div style="padding:16px;">';

  // ===== DASHBOARD =====
  if(tab==="dashboard"){
    html+='<div class="card">'+hoursRow(c)+'</div>';
    html+='<div class="card">';
    html+='<div class="stitle" style="color:#64b5f6;">Esta Semana</div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    html+=sbox("Amazon Neto",fmt(c.an),"#42a5f5")+sbox("Instacart Neto",fmt(c.iN),"#26c6da");
    html+=sbox("Total Neto",fmt(c.tn),"#66bb6a")+sbox("Ahorro 20%",fmt(c.ts),"#ffa726");
    html+=sbox("Propinas",fmt(c.at),"#ab47bc")+sbox("Carry-over",fmt(c.co),"#ef5350");
    html+='</div></div>';
    html+='<div style="background:#0a1a0a;border-radius:12px;padding:16px;border:1px solid #1b5e20;margin-bottom:12px;">';
    html+='<div class="stitle" style="color:#a5d6a7;">🌙 Transferencia del Domingo</div>';
    html+='<div style="background:#0d2b1a;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">';
    html+='<div><div style="font-size:11px;color:#64b5f6;">🏦 Bank of America</div><div style="font-size:10px;color:#546e7a;">Neto + carry-over</div></div>';
    html+='<div style="font-size:22px;font-weight:800;color:#66bb6a;">'+fmt(c.toChk)+'</div></div>';
    html+='<div style="background:#1a0d2b;border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;">';
    html+='<div><div style="font-size:11px;color:#ce93d8;">💰 Capital One Savings</div><div style="font-size:10px;color:#546e7a;">20% + propinas</div></div>';
    html+='<div style="font-size:22px;font-weight:800;color:#ab47bc;">'+fmt(c.toCap)+'</div></div></div>';
    html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">';
    html+='<div class="card" style="margin-bottom:0;"><div style="font-size:10px;color:#64b5f6;margin-bottom:4px;">🏦 BofA Checking</div>';
    html+='<div style="font-size:22px;font-weight:800;color:'+(st.checking>=0?"#66bb6a":"#ef5350")+';">'+fmt(st.checking)+'</div>';
    html+='<div style="font-size:9px;color:#546e7a;">Gastos del mes</div></div>';
    html+='<div style="background:#1a0d2b;border-radius:12px;padding:14px;border:1px solid #4a1a6e;"><div style="font-size:10px;color:#ce93d8;margin-bottom:4px;">💰 Capital One</div>';
    html+='<div style="font-size:22px;font-weight:800;color:#ab47bc;">'+fmt(st.savings)+'</div>';
    html+='<div style="font-size:9px;color:#546e7a;">Ahorro acumulado</div></div></div>';
    html+='<div style="background:#1a0a0a;border-radius:12px;padding:16px;border:1px solid #4a1a1a;margin-bottom:12px;">';
    html+='<div class="stitle" style="color:#ef9a9a;">Deuda Total</div>';
    html+='<div style="font-size:28px;font-weight:800;color:#ef5350;">'+fmt(c.td)+'</div></div>';
    html+='<button data-action="openweek" class="bigbtn" style="background:linear-gradient(135deg,#1b5e20,#2e7d32);">🌙 Cerrar Semana (Domingo)</button>';
  }

  // ===== REGISTER =====
  if(tab==="register"){
    var pg=pf(rf.gross), pt=pf(rf.tips);
    html+='<div class="card">';
    html+='<div class="stitle" style="color:#64b5f6;">Nuevo Bloque</div>';

    // Type toggle
    html+='<div class="row">';
    html+='<button data-rf="type:amazon" class="tbtn'+(rf.type==="amazon"?" on-blue":"")+'">📦 Amazon</button>';
    html+='<button data-rf="type:instacart" class="tbtn'+(rf.type==="instacart"?" on-teal":"")+'">🛒 Instacart</button>';
    html+='</div>';

    // Hecho/Futuro (Amazon only)
    if(rf.type==="amazon"){
      html+='<div class="row">';
      html+='<button data-rf="future:false" class="tbtn'+(!rf.future?" on-blue":"")+'">✅ Bloque hecho</button>';
      html+='<button data-rf="future:true" class="tbtn'+(rf.future?" on-orange":"")+'">📅 Bloque futuro</button>';
      html+='</div>';
    }

    // MONTO PRIMERO
    html+='<div class="lbl">'+(rf.future?"Monto estimado ($)":"Monto Bruto ($)")+'</div>';
    html+='<input type="text" inputmode="decimal" id="rfGross" placeholder="0.00" value="'+rf.gross+'"/>';

    // Day selector
    html+='<div class="lbl">'+(rf.future&&rf.type==="amazon"?"Día programado":"Día")+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;margin-bottom:12px;">';
    for(var i=0;i<DAYS.length;i++){
      html+='<button data-day="'+i+'" class="dbtn'+(rf.day===i?" on":"")+'">' +DAYS[i]+'</button>';
    }
    html+='</div>';

    // Hours (Amazon)
    if(rf.type==="amazon"){
      html+='<div class="lbl">Horas <span style="color:#66bb6a;">('+c.hl+'h libres)</span></div>';
      html+='<div style="display:flex;flex-wrap:wrap;margin-bottom:12px;">';
      for(var i=0;i<AH.length;i++){
        html+='<button data-hours="'+AH[i]+'" class="hbtn'+(rf.hours===AH[i]?" on":"")+'">'+AH[i]+'h</button>';
      }
      html+='</div>';
    }

    // Propinas - solo para bloques de 1h (Amazon) o siempre (Instacart)
    var showTips = rf.type==="instacart" || rf.hours===1;
    if(showTips){
      html+='<div class="lbl">'+(rf.type==="amazon"&&!rf.future?"Propinas (~24h para llegar)":"Propinas")+'</div>';
      html+='<div class="row">';
      html+='<button data-rf="tipsPd:false" class="tbtn'+(!rf.tipsPd?" on-green":"")+'">💵 Disponible</button>';
      if(rf.type==="amazon") html+='<button data-rf="tipsPd:true" class="tbtn'+(rf.tipsPd?" on-orange":"")+'">⏳ Pendiente</button>';
      html+='</div>';
      if(!rf.tipsPd){
        html+='<input type="text" inputmode="decimal" id="rfTips" placeholder="0.00" value="'+rf.tips+'"/>';
      } else {

function attachEvents(){
  // Sync input values on change (not on every keystroke for stability)
  var rfGross=document.getElementById("rfGross");
  if(rfGross){
    rfGross.addEventListener("input",function(){rf.gross=this.value;});
    rfGross.addEventListener("change",function(){rf.gross=this.value;});
    rfGross.addEventListener("blur",function(){rf.gross=this.value;});
    rfGross.addEventListener("keyup",function(){rf.gross=this.value;});
    rfGross.addEventListener("paste",function(){var el=this;setTimeout(function(){rf.gross=el.value;},10);});
  }
  var rfTips=document.getElementById("rfTips");
  if(rfTips){
    rfTips.addEventListener("input",function(){rf.tips=this.value;});
    rfTips.addEventListener("change",function(){rf.tips=this.value;});
    rfTips.addEventListener("blur",function(){rf.tips=this.value;});
    rfTips.addEventListener("keyup",function(){rf.tips=this.value;});
  }
  // Capture gross value when add button is touched (before click fires)
  var addBtn=document.querySelector("[data-action='addblock']");
  if(addBtn){
    addBtn.addEventListener("touchstart",function(){
      var g=document.getElementById("rfGross");
      var t=document.getElementById("rfTips");
      if(g) rf.gross=g.value;
      if(t) rf.tips=t.value;
    },{passive:true});
  }

  var rfInstant=document.getElementById("rfInstant");
  if(rfInstant) rfInstant.addEventListener("change",function(){rf.instant=this.checked;});
  var eGross=document.getElementById("eGross");
  if(eGross) eGross.addEventListener("input",function(){if(editData)editData.grossStr=this.value;});
  var eTips=document.getElementById("eTips");
  if(eTips) eTips.addEventListener("input",function(){if(editData)editData.tipsStr=this.value;});


  // All button clicks via delegation
  document.getElementById("app").addEventListener("click",function(e){
    var t=e.target;
    while(t&&t.id!=="app"){
      // Tab
      if(t.dataset&&t.dataset.tab){tab=t.dataset.tab;render();return;}
      // RF toggles
      if(t.dataset&&t.dataset.rf){
        var parts=t.dataset.rf.split(":");
        var key=parts[0],val=parts[1];
        if(val==="true") val=true;
        else if(val==="false") val=false;
        if(key==="type"){rf.type=val;rf.hours=null;}
        else if(key==="future"){rf.future=val;}
        else if(key==="tipsPd"){rf.tipsPd=val;if(val===true)rf.tips="";}
        render();return;
      }
      // Day
      if(t.dataset&&t.dataset.day!==undefined){rf.day=parseInt(t.dataset.day);render();return;}
      // Hours
      if(t.dataset&&t.dataset.hours!==undefined){rf.hours=parseFloat(t.dataset.hours);render();return;}
      // Edit hours
      if(t.dataset&&t.dataset.ehours!==undefined){
        if(editData){
          var eg=document.getElementById("eGross");
          var et=document.getElementById("eTips");
          var en=document.getElementById("eNote");
          if(eg) editData.grossStr=eg.value;
          if(et) editData.tipsStr=et.value;
          if(en) editData.note=en.value;
          editData.hours=parseFloat(t.dataset.ehours);
          if(editData.hours!==1){editData.tipsPd=false;editData.tipsStr="";}
        }
        render();return;
      }
      // Edit tipsPd
      if(t.dataset&&t.dataset.etipspd!==undefined){
        if(editData){
          // Save current input values before re-render
          var eg=document.getElementById("eGross");
          var en=document.getElementById("eNote");
          if(eg) editData.grossStr=eg.value;
          if(en) editData.note=en.value;
          editData.tipsPd=t.dataset.etipspd==="true";
          if(editData.tipsPd) editData.tipsStr="";
        }
        render();return;
      }
      // Actions
      if(t.dataset&&t.dataset.action){
        var a=t.dataset.action;
        if(a==="addblock"){
          rf.gross=document.getElementById("rfGross")?document.getElementById("rfGross").value:rf.gross;
          rf.tips=document.getElementById("rfTips")?document.getElementById("rfTips").value:rf.tips;

          rf.instant=document.getElementById("rfInstant")?document.getElementById("rfInstant").checked:rf.instant;
          addBlock();return;
        }
        if(a==="openweek"){modal="week";render();return;}
        if(a==="closemodal"){modal=null;render();return;}
        if(a==="closeweek"){closeWeek();return;}
        if(a==="banktx"){bankTx();return;}
        if(a==="canceledit"){editData=null;render();return;}
        if(a==="saveedit"){
          if(editData){
            var eg=document.getElementById("eGross");
            var et=document.getElementById("eTips");

            if(eg) editData.grossStr=eg.value;
            if(et) editData.tipsStr=et.value;

          }
          saveEdit();return;
        }
      }
      // Done future
      if(t.dataset&&t.dataset.done){doneFuture(parseInt(t.dataset.done));return;}
      // Del future
      if(t.dataset&&t.dataset.delf){delFuture(parseInt(t.dataset.delf));return;}
      // Edit block
      if(t.dataset&&t.dataset.edit){var p=t.dataset.edit.split(":");openEdit(p[0],parseInt(p[1]));return;}
      // Del block
      if(t.dataset&&t.dataset.del){var p=t.dataset.del.split(":");delBlock(p[0],parseInt(p[1]));return;}
      // Pay card
      if(t.dataset&&t.dataset.pay){payCard(parseInt(t.dataset.pay));return;}
      // Modal bg close - only if clicking the dark overlay directly
      if(t.id==="modalBg"){modal=null;editData=null;render();return;}
      // Stop bubble from going past modal content box
      if(t.id==="modalContent"){return;}
      t=t.parentElement;
    }
  });
}
